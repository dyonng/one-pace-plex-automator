name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        # Release notes come from the annotated tag message; falls back to
        # auto-generated notes for lightweight tags.
        run: |
          if [ "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "One Pace Plex Automator $GITHUB_REF_NAME" \
              --notes-from-tag
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "One Pace Plex Automator $GITHUB_REF_NAME" \
              --generate-notes
          fi
