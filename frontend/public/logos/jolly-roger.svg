<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Straw hat Jolly Roger: skull and crossbones wearing the hat. -->
  <!-- crossbones -->
  <g stroke="#E8E3D8" stroke-width="7" stroke-linecap="round">
    <path d="M12 24 L52 52"/>
    <path d="M52 24 L12 52"/>
  </g>
  <g fill="#E8E3D8">
    <circle cx="12" cy="24" r="4.5"/><circle cx="17" cy="20" r="4.5"/>
    <circle cx="52" cy="24" r="4.5"/><circle cx="47" cy="20" r="4.5"/>
    <circle cx="12" cy="52" r="4.5"/><circle cx="17" cy="56" r="4.5"/>
    <circle cx="52" cy="52" r="4.5"/><circle cx="47" cy="56" r="4.5"/>
  </g>

  <!-- skull -->
  <path d="M32 12
           C19 12 14 21 14 30
           C14 36 17 40 21 42.5
           L21 49 C21 52 24 54 27 54
           L37 54 C40 54 43 52 43 49
           L43 42.5
           C47 40 50 36 50 30
           C50 21 45 12 32 12 Z"
        fill="#F4EFE4"/>
  <!-- eyes -->
  <ellipse cx="24.5" cy="33" rx="5" ry="6" fill="#1A1714"/>
  <ellipse cx="39.5" cy="33" rx="5" ry="6" fill="#1A1714"/>
  <!-- nose -->
  <path d="M32 38 L29.2 44 L34.8 44 Z" fill="#1A1714"/>
  <!-- teeth gaps -->
  <g stroke="#1A1714" stroke-width="1.8" stroke-linecap="round">
    <path d="M27.5 49 L27.5 53.5"/>
    <path d="M32 49 L32 53.5"/>
    <path d="M36.5 49 L36.5 53.5"/>
  </g>

  <!-- straw hat -->
  <ellipse cx="32" cy="17" rx="26" ry="7" fill="#E9B43C" stroke="#7A4F12" stroke-width="2.5"/>
  <path d="M18 17 A14.5 14.5 0 0 1 46 17 Z" fill="#F2C14E"/>
  <rect x="17" y="11.5" width="30" height="5.5" fill="#D8392B" clip-path="url(#hb)"/>
  <defs><clipPath id="hb"><path d="M18 17 A14.5 14.5 0 0 1 46 17 Z"/></clipPath></defs>
  <path d="M18 17 A14.5 14.5 0 0 1 46 17" fill="none" stroke="#7A4F12" stroke-width="2.5" stroke-linecap="round"/>
</svg>
