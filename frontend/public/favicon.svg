<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Straw hat: wide brim, domed crown, red band. Flat shapes with a warm
       brown outline so it reads clearly at 16px favicon size. -->
  <defs>
    <clipPath id="crown">
      <path d="M13 42 A19 19 0 0 1 51 42 Z"/>
    </clipPath>
  </defs>

  <!-- brim -->
  <ellipse cx="32" cy="42" rx="29" ry="10" fill="#E9B43C" stroke="#7A4F12" stroke-width="3"/>

  <!-- crown dome -->
  <path d="M13 42 A19 19 0 0 1 51 42 Z" fill="#F2C14E"/>

  <!-- red band, clipped to the crown -->
  <rect x="12" y="33.5" width="40" height="8.5" fill="#D8392B" clip-path="url(#crown)"/>

  <!-- crown outline -->
  <path d="M13 42 A19 19 0 0 1 51 42" fill="none" stroke="#7A4F12" stroke-width="3" stroke-linecap="round"/>

  <!-- soft highlight on the dome -->
  <path d="M20 31 A14.5 14.5 0 0 1 30 24.5" fill="none" stroke="#FBE39A" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
</svg>
