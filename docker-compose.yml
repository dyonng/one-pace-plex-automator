services:
  one-pace-automator:
    image: ghcr.io/dyonng/one-pace-plex-automator:latest
    container_name: one-pace-automator
    restart: unless-stopped
    environment:
      # Container timezone — makes cron schedules (POLL_CRON) run in your local
      # time instead of UTC. e.g. America/Toronto, Europe/London.
      - TZ=${TZ:-UTC}
      - RSS_FEED_URL=${RSS_FEED_URL}
      - QBIT_URL=${QBIT_URL:-http://qbittorrent:8080}
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_LIBRARY_NAME=${PLEX_LIBRARY_NAME:-TV Shows}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - POLL_CRON=${POLL_CRON:-*/5 * * * *}
      - DOWNLOAD_CHECK_SECONDS=${DOWNLOAD_CHECK_SECONDS:-30}
      - AUTO_DOWNLOAD=${AUTO_DOWNLOAD:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DASHBOARD_TOKEN_HASH=${DASHBOARD_TOKEN_HASH:-}
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8282}
    ports:
      - "${DASHBOARD_PORT:-8282}:${DASHBOARD_PORT:-8282}"
    volumes:
      - ./data:/data
      - /path/to/your/one-pace:/media/one-pace
      - /path/to/your/downloads:/downloads
    networks:
      - media-stack

networks:
  media-stack:
    external: true
    name: media-stack
