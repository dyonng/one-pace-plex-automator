services:
  one-pace-automator:
    image: ghcr.io/dyonng/one-pace-plex-automator:latest
    container_name: one-pace-automator
    restart: unless-stopped
    environment:
      - RSS_FEED_URL=${RSS_FEED_URL}
      - QBIT_URL=${QBIT_URL:-http://qbittorrent:8080}
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_LIBRARY_NAME=${PLEX_LIBRARY_NAME:-TV Shows}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - POLL_CRON=${POLL_CRON:-0 * * * *}
      - SYNC_CRON=${SYNC_CRON:-0 3 * * *}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/data
      - /path/to/your/tv/library:/media/tv
      - /path/to/your/downloads:/downloads/one-pace
    networks:
      - media-stack

networks:
  media-stack:
    external: true
    name: media-stack
